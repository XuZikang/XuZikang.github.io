<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg">
            <a href="#about-me">{{ site.title | default: "Home" }}</a>
          </li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{{ link.url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
        </ul>
        <div class="theme-toggle">
          <button id="theme-toggle" class="theme-toggle-btn dark" aria-label="Toggle theme">
            <span class="theme-icon sun-icon" style="display:none;">☀️</span>
            <span class="theme-icon moon-icon" style="display:block;">🌙</span>
          </button>
        </div>
      </nav>
    </div>
  </div>
</div>
