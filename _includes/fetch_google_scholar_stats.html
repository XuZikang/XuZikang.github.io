<script>
(function() {
  var gsDataBaseUrl = {% if site.google_scholar_stats_use_cdn %}
    'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
  {% else %}
    'https://raw.githubusercontent.com/{{ site.repository }}/'
  {% endif %};

  fetch(gsDataBaseUrl + 'google-scholar-stats/gs_data.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var pubs = data['publications'] || {};
      var total = data['citedby'] || 0;

      // Update total citation count
      var totalEls = document.querySelectorAll('.pub-citations');
      totalEls.forEach(function(el) {
        var title = el.getAttribute('data-pub-title');
        if (!title) return;

        // Try to find the publication by matching title
        var pubId = null;
        for (var id in pubs) {
          if (pubs[id] && pubs[id]['bib']) {
            var pubTitle = (pubs[id]['bib']['title'] || '').toLowerCase().trim();
            if (title.toLowerCase().trim() === pubTitle) {
              pubId = id;
              break;
            }
          }
        }

        if (pubId && pubs[pubId]) {
          var cites = pubs[pubId]['num_citations'] || 0;
          el.textContent = 'Citations: ' + cites;
        }
      });
    })
    .catch(function(e) {
      console.log('Google Scholar stats unavailable:', e);
    });
})();
</script>
